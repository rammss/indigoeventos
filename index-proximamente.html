<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Indigo Eventos | Proximamente</title>
  <meta name="description" content="Indigo Eventos esta preparando una nueva experiencia. Proximamente." />

  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-1: #0b1e2b;
      --bg-2: #11384b;
      --bg-3: #1f6f8b;
      --text: #f3f8fb;
      --text-soft: #cfe4ee;
      --accent: #ffd166;
      --card: rgba(8, 25, 36, 0.54);
      --border: rgba(255, 255, 255, 0.2);
      --shadow: 0 24px 48px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Space Grotesk", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 10% 10%, #3c7f95 0%, transparent 35%),
                  radial-gradient(circle at 88% 16%, #6da9bc 0%, transparent 32%),
                  linear-gradient(130deg, var(--bg-1), var(--bg-2) 55%, var(--bg-3));
      overflow-x: hidden;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(255, 255, 255, 0.05) 0.6px, transparent 0.6px);
      background-size: 3px 3px;
      opacity: 0.35;
      z-index: -1;
    }

    .card {
      width: min(960px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 44px 40px;
      display: grid;
      gap: 28px;
      animation: rise 850ms ease both;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      animation: fade 800ms ease 160ms both;
    }

    .brand img {
      width: clamp(150px, 18vw, 230px);
      height: auto;
      border-radius: 14px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.25);
      background: #f7f1e5;
      border: 1px solid #d8c8aa;
      padding: 10px;
    }

    .brand p {
      letter-spacing: 0.14em;
      font-size: 0.8rem;
      text-transform: uppercase;
      color: var(--text-soft);
      font-weight: 700;
    }

    h1 {
      font-family: "Instrument Serif", serif;
      font-size: clamp(2.2rem, 6vw, 5rem);
      font-weight: 400;
      line-height: 0.95;
      max-width: 14ch;
      animation: fade 900ms ease 260ms both;
    }

    .highlight {
      color: var(--accent);
      font-style: italic;
    }

    .subtitle {
      max-width: 56ch;
      color: var(--text-soft);
      line-height: 1.6;
      font-size: clamp(1rem, 1.8vw, 1.1rem);
      animation: fade 1000ms ease 340ms both;
    }

    .bar {
      width: min(420px, 100%);
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      overflow: hidden;
      animation: fade 1000ms ease 430ms both;
    }

    .bar span {
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ffd166, #f4a261);
      animation: progress 2200ms ease-in-out infinite;
    }

    .footer {
      font-size: 0.88rem;
      color: rgba(243, 248, 251, 0.86);
      animation: fade 1000ms ease 520ms both;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes progress {
      0% {
        transform: translateX(-55%);
      }
      50% {
        transform: translateX(130%);
      }
      100% {
        transform: translateX(-55%);
      }
    }

    @media (max-width: 700px) {
      body {
        padding: 16px;
      }

      .card {
        border-radius: 22px;
        padding: 28px 22px;
        gap: 22px;
      }

      .brand {
        gap: 12px;
      }

      .brand p {
        font-size: 0.74rem;
      }

      .subtitle {
        line-height: 1.5;
      }
    }
  </style>
</head>
<body>
  <div class="noise" aria-hidden="true"></div>

  <main class="card" role="main">
    <div class="brand">
      <img src="assets/logo.png" alt="Logo de Indigo Eventos" />
      <p>Indigo Eventos</p>
    </div>

    <h1>
      Estamos creando
      <span class="highlight">algo inolvidable</span>
    </h1>

    <p class="subtitle">
      Muy pronto lanzaremos nuestro nuevo sitio para que descubras experiencias,
      celebraciones y producciones con sello Indigo. Gracias por tu paciencia.
    </p>

    <div class="bar" aria-label="Sitio en preparacion">
      <span></span>
    </div>

    <p class="footer">Proximamente disponible.</p>
  </main>
</body>
</html>
